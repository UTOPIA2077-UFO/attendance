<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>威学考勤 Pro v7</title>
    <style>
        :root { --red: #D32F2F; --black: #1A1A1A; --gray: #f8f9fa; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: -apple-system, sans-serif; background: var(--gray); margin: 0; padding-bottom: 30px; overflow-x: hidden; }
        
        /* 头部样式 */
        .header { background: var(--black); color: white; padding: 20px; text-align: center; border-radius: 0 0 20px 20px; }
        .title { border-bottom: 2px solid var(--red); font-size: 20px; font-weight: bold; }

        /* 转换工具栏 */
        .tool-bar { background: #fff; margin: 10px; padding: 15px; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
        .conv-row { display: flex; align-items: center; gap: 8px; }
        .conv-row input { flex: 1; width: 50px; padding: 8px; border: 1px solid #ddd; border-radius: 6px; text-align: center; }
        .apply-btn { width: 100%; background: var(--black); color: white; border: none; padding: 10px; border-radius: 8px; margin-top: 10px; font-weight: bold; font-size: 13px; }

        /* 数据卡片 */
        .dash { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; padding: 0 10px; margin-top: 10px; }
        .card { background: white; padding: 12px; border-radius: 12px; text-align: center; }
        .card.red { background: var(--red); color: white; }
        .val { font-size: 18px; font-weight: 900; display: block; }

        /* 日历区域 */
        .nav { display: flex; justify-content: space-between; padding: 15px 20px; align-items: center; }
        .grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 5px; padding: 0 10px; }
        .weekday { text-align: center; font-size: 12px; color: #999; }
        .day { background: white; aspect-ratio: 0.85; border-radius: 8px; display: flex; flex-direction: column; align-items: center; justify-content: center; border: 1px solid #eee; position: relative; }
        .day-n { font-size: 14px; font-weight: bold; }
        .day-s { font-size: 11px; font-weight: 800; color: #bbb; }
        
        /* 特殊状态 */
        .day.is-off { background: #ececec; border-color: #ddd; }
        .day.has-a { background: #fffcf0; border-color: #f9eeb0; }
        .day.has-a .day-s { color: #b58900; }
        .day.has-o { border: 2px solid var(--red); background: #fff8f8; }
        .day.has-o .day-s { color: var(--red); }

        /* 弹窗 */
        #modal { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 85%; max-width: 320px; background: white; padding: 20px; border-radius: 20px; z-index: 101; }
        .overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); z-index: 100; backdrop-filter: blur(3px); }
        .form-g { margin-bottom: 12px; }
        .form-g label { font-size: 11px; color: #999; display: block; margin-bottom: 4px; }
        input, select { width: 100%; padding: 10px; border: 1px solid #eee; border-radius: 8px; font-size: 14px; }
        .btn-save { width: 100%; padding: 14px; background: var(--red); color: white; border: none; border-radius: 10px; font-weight: bold; }
    </style>
</head>
<body>

<div class="header"><span class="title">威学一百考勤 Pro</span></div>

<div class="tool-bar">
    <div class="conv-row">
        <input type="number" id="inD" placeholder="天" oninput="sD()">
        <span>天 =</span>
        <input type="number" id="inH" placeholder="小时" oninput="sH()">
        <span>小时</span>
    </div>
    <button class="apply-btn" onclick="saveI()">应用为历史起算点</button>
</div>

<div class="dash">
    <div class="card"><span class="val" id="vP">0.0</span><span style="font-size:10px">上月结余(h)</span></div>
    <div class="card red"><span class="val" id="vT">0.0</span><span style="font-size:10px">当前总剩余(h)</span></div>
</div>

<div class="nav">
    <button onclick="chM(-1)">◀</button>
    <b id="mLab">2026-04</b>
    <button onclick="chM(1)">▶</button>
</div>

<div class="grid" id="grid"></div>

<div class="overlay" id="ovl" onclick="closeM()"></div>
<div id="modal">
    <div id="mDt" style="font-weight:bold; color:var(--red); margin-bottom:15px;"></div>
    <div class="form-g"><label>班次</label><select id="mS"><option value="F">F班</option><option value="A">A班</option><option value="C">C班</option><option value="OFF">休息</option></select></div>
    <div class="form-g"><label>加班 (+h)</label><input type="number" id="mA" step="0.1" placeholder="0"></div>
    <div class="form-g"><label>调休 (-h)</label><input type="number" id="mO" step="0.1" placeholder="0"></div>
    <div class="form-g"><label>备注</label><input type="text" id="mR" placeholder="迟到/忘打卡"></div>
    <button class="btn-save" onclick="doS()">保存</button>
</div>

<script>
    // 版本标记，确保数据隔离
    const V = 'v7';
    let db = JSON.parse(localStorage.getItem('wx_db_'+V)) || {};
    let cfg = JSON.parse(localStorage.getItem('wx_cfg_'+V)) || { baseH: 0 };
    let cY = new Date().getFullYear(), cM = new Date().getMonth();
    let curK = '';

    function sD() { document.getElementById('inH').value = (document.getElementById('inD').value * 7.75).toFixed(2); }
    function sH() { document.getElementById('inD').value = (document.getElementById('inH').value / 7.75).toFixed(2); }
    function saveI() { cfg.baseH = parseFloat(document.getElementById('inH').value) || 0; localStorage.setItem('wx_cfg_'+V, JSON.stringify(cfg)); render(); alert('设置成功！'); }

    function render() {
        document.getElementById('mLab').innerText = `${cY}-${String(cM+1).padStart(2,'0')}`;
        const g = document.getElementById('grid'); g.innerHTML = '';
        ['日','一','二','三','四','五','六'].forEach(w=>g.innerHTML+=`<div class="weekday">${w}</div>`);

        let hist = cfg.baseH;
        Object.keys(db).sort().forEach(k => {
            const [y, m] = k.split('-').map(Number);
            if(y < cY || (y === cY && m < cM + 1)) hist += (db[k].a - db[k].o);
        });
        document.getElementById('vP').innerText = hist.toFixed(2);

        let mA = 0, mO = 0;
        const first = new Date(cY, cM, 1).getDay();
        const days = new Date(cY, cM+1, 0).getDate();
        for(let i=0; i<first; i++) g.innerHTML += '<div></div>';

        for(let d=1; d<=days; d++) {
            const k = `${cY}-${String(cM+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
            const data = db[k] || {s:'F', a:0, o:0, r:''};
            mA += data.a; mO += data.o;
            
            let cls = 'day';
            let txt = data.s === 'OFF' ? '休' : data.s;
            if(data.s === 'OFF') cls += ' is-off';
            if(data.a > 0) { cls += ' has-a'; txt = '+' + data.a; }
            if(data.o > 0) { cls += ' has-o'; txt = '-' + data.o; }
            if(data.r && data.a === 0 && data.o === 0) txt = '注';

            g.innerHTML += `<div class="${cls}" onclick="openM('${k}')"><span class="day-n">${d}</span><span class="day-s">${txt}</span></div>`;
        }
        document.getElementById('vT').innerText = (hist + mA - mO).toFixed(2);
    }

    function openM(k) {
        curK = k; const d = db[k] || {s:'F', a:0, o:0, r:''};
        document.getElementById('mDt').innerText = k;
        document.getElementById('mS').value = d.s;
        document.getElementById('mA').value = d.a || '';
        document.getElementById('mO').value = d.o || '';
        document.getElementById('mR').value = d.r || '';
        document.getElementById('modal').style.display = 'block';
        document.getElementById('ovl').style.display = 'block';
    }
    function doS() {
        let o = parseFloat(document.getElementById('mO').value) || 0;
        db[curK] = {s:document.getElementById('mS').value, a:parseFloat(document.getElementById('mA').value)||0, o:(o>0 && o<3.25 ? 0 : o), r:document.getElementById('mR').value};
        localStorage.setItem('wx_db_'+V, JSON.stringify(db));
        closeM(); render();
    }
    function closeM() { document.getElementById('modal').style.display='none'; document.getElementById('ovl').style.display='none'; }
    function chM(n) { cM += n; if(cM<0){cM=11;cY--;} else if(cM>11){cM=0;cY++;} render(); }
    render();
</script>
</body>
</html>
